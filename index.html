<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ковер-самолет</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .calc {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      padding: 30px;
      border-radius: 20px;
      width: 420px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    }
    h1 { margin: 0 0 25px; text-align: center; font-size: 26px; }
    label { display: block; margin: 15px 0 6px; font-size: 15px; }
    input {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      margin-bottom: 15px;
      text-align: center;
    }
    .markup-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 20px 0;
    }
    button {
      padding: 14px;
      font-size: 15px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.25);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover, button.active {
      background: white;
      color: #2575fc;
      font-weight: bold;
    }
    .result {
      margin-top: 25px;
      padding: 20px;
      background: rgba(0,0,0,0.25);
      border-radius: 15px;
      font-size: 20px;
      line-height: 1.6;
    }
    .btn-calc {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      background: #fff;
      color: #2575fc;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>
<div class="calc">
  <h1>Калькулятор цены</h1>

</div>

<script>

</script>
</body>
</html>
